<div class="activate-page">
    <div class="activate-container">
        <div class="activate-header">
            <div class="activate-icon" id="activate-icon" aria-hidden="true">⏳</div>
            <h2 id="activate-title">Activando cuenta...</h2>
            <p id="activate-message">Por favor espera mientras verificamos tu email.</p>
        </div>
        
        <div class="activate-content" id="activate-content"
             role="status" aria-live="polite" aria-atomic="true">
            <div class="loading-spinner" aria-hidden="true"></div>
            <span class="sr-only">Verificando cuenta, por favor espera.</span>
        </div>
        
        <div class="activate-footer" id="activate-footer" style="display: none;">
            <a href="#login" class="btn btn-primary">Ir a Iniciar Sesión</a>
            <p class="help-text">
                ¿Problemas con la activación? <a href="#register">Regístrate de nuevo</a>
            </p>
        </div>
    </div>
</div>
