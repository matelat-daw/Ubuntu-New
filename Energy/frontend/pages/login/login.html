<div class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon" aria-hidden="true">🔐</div>
            <h2>Iniciar Sesión</h2>
            <p>Accede a tu cuenta de Energy App</p>
        </div>
        
        <form id="login-form" class="login-form" novalidate aria-label="Formulario de inicio de sesión">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required 
                       placeholder="tu@email.com"
                       aria-required="true"
                       autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" name="password" required 
                           placeholder="••••••••"
                           aria-required="true"
                           autocomplete="current-password">
                    <button type="button" class="password-toggle" id="toggle-password" 
                            aria-label="Mostrar contraseña"
                            aria-controls="password"
                            aria-pressed="false">
                        <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" 
                             fill="none" stroke="currentColor" stroke-width="2"
                             aria-hidden="true" focusable="false">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div id="login-error" class="error-message" style="display: none;" 
                 role="alert" aria-live="assertive" aria-atomic="true"></div>
            
            <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                Iniciar Sesión
            </button>
        </form>

        <div class="login-footer">
            <p>¿No tienes cuenta? <a href="#register" class="link">Regístrate aquí</a></p>
        </div>
    </div>
</div>
